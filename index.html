<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            box-shadow: 3px 3px black;
        }
        img {
            width: 200px;
        }

        #contenedor {
            background-color: purple;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            
        }

        #contenedor div {
            background-color: white;
            padding: 20px;
            text-align: center;
        }
        
        table#tabla-jugadores, td {
            border: 2px solid purple;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Jugadores del Real Madrid</h1>
    <audio src="https://soundcloud.com/ramosalah/hala-madrid?utm_source=clipboard&utm_campaign=wtshare&utm_medium=widget&utm_content=https%253A%252F%252Fsoundcloud.com%252Framosalah%252Fhala-madrid">EL himno</audio>
    <div id="contenedor">

    </div>

    <table id="tabla-jugadores">

    </table>
    <script>
    let jugadores=[
        {
            nombre:"Mbappe",
            edad: 28,
            ficha: 20000,
            foto: "mbappe.jpg"
        },

        {
            nombre:"raul",
            edad: 48,
            ficha: 20000,
            foto: "raul.jpg"
        },

         {
            nombre:"tragueño",
            edad: 40,
            ficha: 40000,
            foto: "tragueño.jpg"
        },

         {
            nombre:"zidane",
            edad: 42,
            ficha: 30000,
            foto: "zidane.jpg"
        },
    ]

    for (let i=0; i<jugadores.length; i++) {
        nombreJugador=jugadores[i].nombre;
        edadJugador=jugadores[i].edad;
        fichaJugador=jugadores[i].ficha;
        fotoJugador=jugadores[i].foto

        nuevaCaja=document.createElement("div");
        nuevoH1=document.createElement("h1");
        nuevoH1.innerHTML=nombreJugador;
        nuevaCaja.appendChild(nuevoH1);
       
        nuevoH2=document.createElement("h2");
        nuevoH2.innerHTML="Edad:"+edadJugador
        nuevaCaja.appendChild(nuevoH2);

        nuevoH3=document.createElement("h3");
        nuevoH3.innerHTML="Ficha"+fichaJugador;
        nuevaCaja.appendChild(nuevoH3);
        
        nuevaFoto=document.createElement("img");
        nuevaFoto.src = "images/" + fotoJugador;
        nuevaCaja.appendChild(nuevaFoto);
        

        document.getElementById("contenedor").appendChild(nuevaCaja);
    
    }

    let nuevoTRCCabecera=document.createElement("tr");
    let cabeceraNombre=document.createElement("th");
    cabeceraNombre.innerHTML="Nombre";
    nuevoTRCCabecera.appendChild(cabeceraNombre);

    let cabeceraEdad=document.createElement("th");
    cabeceraEdad.innerHTML="Edad";
    nuevoTRCCabecera.appendChild(cabeceraEdad);

    tdFoto=document.createElement("td");
    tdFoto.innerHTML="foto";
    nuevoTRCCabecera.appendChild(tdFoto);


    

    // añado la fila a la tabla
    document.getElementById("tabla-jugadores").appendChild(nuevoTRCCabecera);

    for (jugador of jugadores) {
         let nuevoTR=document.createElement("tr");
         //creo un td para el nombre y lo agrego al tr

         let tdNombre=document.createElement("td");
         tdNombre.innerHTML= jugador.nombre;
         nuevoTR.appendChild(tdNombre);


         let tdEdad=document.createElement("td");
         tdEdad.innerHTML= jugador.edad;
         nuevoTR.appendChild(tdEdad);


          let tdFoto=document.createElement("td");
          nuevaFoto = document.createElement("img");
          nuevaFoto.src = "images/" + jugador.foto;
         tdFoto.appendChild(nuevaFoto);
         
         nuevoTR.appendChild(tdFoto);
        // añado a la tabla

         document.getElementById("tabla-jugadores").appendChild(nuevoTR);
    }
    </script>
</body>
</html>
